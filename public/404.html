<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect trick
      // Encodes the path into a query string and redirects to index.html
      var path = window.location.pathname;
      window.location.replace(
        window.location.origin + '/?p=' + encodeURIComponent(path)
      );
    </script>
  </head>
  <body></body>
</html>
